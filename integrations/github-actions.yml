name: Grafana Sentinel — CI/CD Testing

on:
  push:
    branches: [main, develop, 'release/**']
  pull_request:
    branches: [main]
  schedule:
    # Run full suite daily at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      test_level:
        description: 'Test level (smoke/standard/full)'
        required: false
        default: 'standard'
      grafana_url:
        description: 'Grafana URL (overrides secret)'
        required: false

jobs:
  # ─────────────────────────────────────────────────────────────
  # Smoke test — fast gate on every PR/push
  # ─────────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Test (5 min gate)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'pull_request'
    timeout-minutes: 10

    services:
      grafana:
        image: grafana/grafana:latest
        ports:
          - 3000:3000
        env:
          GF_AUTH_ANONYMOUS_ENABLED: 'true'
          GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
          GF_SECURITY_ADMIN_PASSWORD: admin
        options: >-
          --health-cmd "curl -f http://localhost:3000/api/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Create test service account token
        id: sa-token
        run: |
          TOKEN=$(curl -s -X POST http://admin:admin@localhost:3000/api/serviceaccounts \
            -H 'Content-Type: application/json' \
            -d '{"name":"sentinel-ci","role":"Admin"}' | jq -r .id)
          KEY=$(curl -s -X POST http://admin:admin@localhost:3000/api/serviceaccounts/$TOKEN/tokens \
            -H 'Content-Type: application/json' \
            -d '{"name":"ci-token"}' | jq -r .key)
          echo "TOKEN=$KEY" >> $GITHUB_OUTPUT

      - name: Run Sentinel smoke test
        env:
          GRAFANA_URL: 'http://localhost:3000'
          GRAFANA_TOKEN: ${{ steps.sa-token.outputs.TOKEN }}
          TEST_LEVEL: smoke
        run: node cli/sentinel.js run --url $GRAFANA_URL --token $GRAFANA_TOKEN --level smoke

      - name: Upload smoke test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-report-${{ github.sha }}
          path: reports/
          retention-days: 7

  # ─────────────────────────────────────────────────────────────
  # Standard test — on merges to main
  # ─────────────────────────────────────────────────────────────
  standard-test:
    name: Standard Test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    timeout-minutes: 25
    needs: []

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: cd backend && npm ci

      - name: Run standard test
        env:
          GRAFANA_URL: ${{ inputs.grafana_url || vars.GRAFANA_URL || secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
          TEST_LEVEL: ${{ inputs.test_level || 'standard' }}
        run: |
          node cli/sentinel.js run \
            --url "$GRAFANA_URL" \
            --token "$GRAFANA_TOKEN" \
            --level "$TEST_LEVEL" \
            --report-dir ./reports

      - name: Push metrics to Pushgateway
        if: success() && vars.PUSHGATEWAY_URL != ''
        env:
          PUSHGATEWAY_URL: ${{ vars.PUSHGATEWAY_URL }}
        run: |
          node cli/sentinel.js report push --pushgateway "$PUSHGATEWAY_URL" --job grafana-sentinel-ci

      - name: Generate executive summary
        if: always()
        run: node cli/sentinel.js report executive --output ./reports/executive.html

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: standard-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Comment PR with summary
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const files = fs.readdirSync('./reports').filter(f => f.endsWith('.json')).sort().reverse();
            if (!files.length) return;
            const report = JSON.parse(fs.readFileSync(`./reports/${files[0]}`, 'utf8'));
            const s = report.summary || {};
            const icon = s.pass_rate >= 80 ? '✅' : s.pass_rate >= 60 ? '⚠️' : '❌';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${icon} Grafana Sentinel Report\n\n| Metric | Value |\n|---|---|\n| Pass Rate | ${s.pass_rate}% |\n| Total Tests | ${s.total} |\n| Passed | ${s.passed} |\n| Failed | ${s.failed} |\n| Warnings | ${s.warnings} |`
            });

  # ─────────────────────────────────────────────────────────────
  # Full suite — scheduled daily run
  # ─────────────────────────────────────────────────────────────
  full-test:
    name: Full Test Suite (Daily)
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: cd backend && npm ci
      - name: Run full test
        env:
          GRAFANA_URL: ${{ secrets.GRAFANA_URL }}
          GRAFANA_TOKEN: ${{ secrets.GRAFANA_TOKEN }}
        run: node cli/sentinel.js run --url "$GRAFANA_URL" --token "$GRAFANA_TOKEN" --level full
      - name: Notify Slack on failure
        if: failure() && vars.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ vars.SLACK_WEBHOOK_URL }}
        run: |
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"text":"❌ Grafana Sentinel full test FAILED on ${{ github.ref }}"}'
      - name: Upload full report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-report-${{ github.run_id }}
          path: reports/
          retention-days: 90
