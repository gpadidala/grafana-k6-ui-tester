services:
  grafana-probe:
    build:
      context: .
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-}
    container_name: grafana-probe
    ports:
      - "4000:4000"
    environment:
      - GRAFANA_URL=${GRAFANA_URL:-http://host.docker.internal:3000}
      - GRAFANA_API_TOKEN=${GRAFANA_API_TOKEN}
      - PORT=4000
    volumes:
      - probe-data:/app/backend/data
      - probe-reports:/app/backend/reports
      - probe-screenshots:/app/backend/screenshots
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Optional: test Grafana instance
  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana-test
    profiles: ["with-grafana"]
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin

volumes:
  probe-data:
  probe-reports:
  probe-screenshots:
