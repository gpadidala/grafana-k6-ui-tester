<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180" role="img" aria-label="Heimdall logo">
  <defs>
    <linearGradient id="hdGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <linearGradient id="hdRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="hdEye" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="60%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#312e81"/>
    </radialGradient>
    <filter id="hdGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark rounded card background -->
  <rect x="4" y="4" width="172" height="172" rx="36" ry="36" fill="#0f172a" stroke="url(#hdRing)" stroke-width="2"/>

  <!-- Outer all-seeing ring (watchman of Bifrost) -->
  <circle cx="90" cy="90" r="62" fill="none" stroke="url(#hdRing)" stroke-width="3" stroke-dasharray="6 6" opacity="0.55"/>
  <circle cx="90" cy="90" r="48" fill="none" stroke="url(#hdRing)" stroke-width="2" opacity="0.35"/>

  <!-- The all-seeing eye at the center -->
  <ellipse cx="90" cy="92" rx="34" ry="20" fill="#0a0f1c" stroke="url(#hdRing)" stroke-width="2"/>
  <circle cx="90" cy="92" r="14" fill="url(#hdEye)" filter="url(#hdGlow)"/>
  <circle cx="90" cy="92" r="6" fill="#0a0f1c"/>
  <circle cx="93" cy="89" r="2" fill="#e0e7ff" opacity="0.9"/>

  <!-- H monogram above the eye -->
  <text x="90" y="54" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="30" font-weight="800" fill="url(#hdGrad)" letter-spacing="-0.5">H</text>

  <!-- Wordmark -->
  <text x="90" y="150" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="15" font-weight="700" fill="#e2e8f0" letter-spacing="1">HEIMDALL</text>
</svg>
