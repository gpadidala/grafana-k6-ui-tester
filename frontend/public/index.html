<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0f1419" />
    <meta name="description" content="Grafana k6 UI Tester — Dashboard by Gopal Rao" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              surface: { DEFAULT: '#0f1419', 100: '#1a1f2e', 200: '#232a3b', 300: '#2d3748' },
              accent: { DEFAULT: '#3b82f6', hover: '#60a5fa', muted: '#1e3a5f' },

              danger: '#ef4444',
              warning: '#eab308',
              muted: '#8899a6',

          }
        }
      }

    <link rel="preconnect" href="https://fonts.googleapis.com">

      body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }

    <title>Grafana k6 UI Tester</title>
